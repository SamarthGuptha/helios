syntax = "proto3";
package helios;
service DistributedCompiler {
    rpc DispatchTask (CompileTask) returns (CompileResponse);
    rpc Ping (NodeInfo) returns (NodeStatus);

}
message CompileTask {
    string task_id = 1;
    string source_filename = 2;
    bytes source_content = 3;
    repeated string compiler_flags = 4;
    string compiler_version = 5;
    string target_triple = 6;
    map<string, string> env_vars = 7;
}

message CompileResponse {
    string task_id = 1;
    int32 exit_code = 2;
    bytes object_file = 3;
    string stdout_logs = 4;
    string stderr_logs = 5;
    uint64 duration_ms = 6;
}
message NodeInfo {
    string node_id = 1;
}
message NodeStatus {
    bool accepts_tasks = 1;
    uint32 active_jobs = 2;
    uint32 max_concurrency = 3;
}